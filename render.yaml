services:
  - type: web
    name: godlywomen
    env: node
    region: ohio
    plan: free
    buildCommand: npm install && npm run build && cd backend && pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput
    startCommand: bash start.sh
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*.render.com,localhost"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://godlywomenn.onrender.com"
      - key: NEXT_PUBLIC_DJANGO_API
        value: "http://localhost:10000"
      - key: DJANGO_API_URL
        value: "http://localhost:10000"
      - key: NEXTAUTH_URL
        value: "https://godlywomenn.onrender.com"
      - key: PYTHONUNBUFFERED
        value: "1"

databases:
  - name: godlywomen_db
    engine: postgres
    plan: free
    region: ohio
